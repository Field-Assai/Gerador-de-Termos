<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gerador de Termos | Sistema Unificado</title>
    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="app" class="app-layout">
      <!-- PAINEL DIREITO: FORMULÁRIO -->
      <main class="glass-panel form-panel">
        <header>
          <div class="icon-container">
            <svg width="56" height="56" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M14 2H6C4.89543 2 4 2.89543 4 4V20C4 21.1046 4.89543 22 6 22H18C19.1046 22 20 21.1046 20 20V8L14 2Z" fill="url(#paint0_linear)" stroke="#93C5FD" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M14 2V8H20" stroke="#93C5FD" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M16 13H8" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M16 17H8" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M10 9H8" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              <defs>
                <linearGradient id="paint0_linear" x1="4" y1="2" x2="20" y2="22" gradientUnits="userSpaceOnUse">
                  <stop stop-color="#3B82F6" stop-opacity="0.9"/>
                  <stop offset="1" stop-color="#8B5CF6" stop-opacity="0.9"/>
                </linearGradient>
              </defs>
            </svg>
          </div>
          <h1>SISTEMA UNIFICADO DE TERMOS</h1>
          <p class="subtitle">Gerador de Termos de Entrega e Devolução</p>
          <div class="date-badge" id="dateDisplay">
            📅 Data atual: <span id="currentDateString"></span>
          </div>
        </header>

        <form id="termForm">
          <div class="form-group row">
            <div class="input-col">
              <label for="tipoTermo">Tipo de Termo:</label>
              <select id="tipoTermo" required>
                <option value="Entrega" selected>Entrega</option>
                <option value="Devolução">Devolução</option>
              </select>
            </div>
          </div>

          <div class="form-grid">
            <div class="form-group">
              <label for="nome">Nome do Usuário:</label>
              <input type="text" id="nome" placeholder="Digite o nome completo" required />
            </div>
            <div class="form-group">
              <label for="matricula">Matrícula:</label>
              <input type="text" id="matricula" placeholder="Digite a matrícula" required />
            </div>
            
            <div class="form-group">
              <label for="modelo">Modelo:</label>
              <input type="text" id="modelo" placeholder="Ex: Dell Latitude 5490" required />
            </div>
            <div class="form-group">
              <label for="codigo_interno">Código Interno:</label>
              <input type="text" id="codigo_interno" placeholder="Código interno do equipamento" required />
            </div>

            <div class="form-group">
              <label for="numero_serie">Número de Série:</label>
              <input type="text" id="numero_serie" placeholder="Número de série do equipamento" required />
            </div>
            <div class="form-group">
              <label for="patrimonio">Patrimônio:</label>
              <input type="text" id="patrimonio" placeholder="Número do patrimônio" required />
            </div>
            
            <div class="form-group" id="nomeTecnicoContainer" style="display: none;">
              <label for="nomeTecnico">Técnico que Recebeu:</label>
              <input type="text" id="nomeTecnico" placeholder="Nome do técnico" />
            </div>
          </div>

          <div class="form-grid" id="novoEquipamentoGrid" style="display: none; border-top: 1px dashed rgba(255,255,255,0.2); padding-top: 20px; margin-top: 5px; margin-bottom: 20px;">
            <h3 style="grid-column: 1 / -1; font-size: 1.1rem; color: #3b82f6; margin-bottom: 10px; margin-top: 0;">Dados do NOVO Equipamento (Entrega)</h3>
            
            <div class="form-group">
              <label for="modelo_novo">Modelo Novo:</label>
              <input type="text" id="modelo_novo" placeholder="Ex: Dell Latitude 5490" />
            </div>
            <div class="form-group">
              <label for="codigo_interno_novo">Código Interno Novo:</label>
              <input type="text" id="codigo_interno_novo" placeholder="Código interno" />
            </div>
            <div class="form-group">
              <label for="numero_serie_novo">Número de Série Novo:</label>
              <input type="text" id="numero_serie_novo" placeholder="Número de série" />
            </div>
            <div class="form-group">
              <label for="patrimonio_novo">Patrimônio Novo:</label>
              <input type="text" id="patrimonio_novo" placeholder="Número do patrimônio" />
            </div>
          </div>

          <div class="form-group" id="trocaContainer" style="display: none; margin-bottom: 20px;">
            <label style="display: flex; align-items: center; gap: 5px; cursor: pointer;">
              <input type="checkbox" id="checkTroca"> TROCA
            </label>
          </div>

          <div class="form-group" id="acessoriosContainer" style="margin-bottom: 20px;">
            <label>Acessórios Inclusos (Apenas Entrega):</label>
            <div class="checkbox-group" style="display: flex; gap: 15px; margin-top: 10px;">
              <label style="display: flex; align-items: center; gap: 5px; cursor: pointer;">
                <input type="checkbox" id="checkMouse" value="Mouse"> Mouse
              </label>
              <label style="display: flex; align-items: center; gap: 5px; cursor: pointer;">
                <input type="checkbox" id="checkHeadset" value="Headset"> Headset
              </label>
              <label style="display: flex; align-items: center; gap: 5px; cursor: pointer;">
                <input type="checkbox" id="checkMochila" value="Mochila"> Mochila
              </label>
            </div>
          </div>

          <button type="submit" id="submitBtn">
            <span class="btn-icon">📄</span> GERAR TERMO E BAIXAR
          </button>
        </form>

        <div id="successMessage" class="success-message hidden">
          ✅ Termo gerado com sucesso! Os campos foram limpos.
        </div>
      </main>

    </div>

    <div style="position: fixed; bottom: 15px; right: 20px; font-size: 0.85rem; color: var(--text-muted, #94a3b8); font-weight: 500; letter-spacing: 0.5px; opacity: 0.8;">
      Criado por André Aguado
    </div>

    <script type="module" src="/main.js"></script>
  </body>
</html>
